<svg width="100%" viewBox="0 0 685.3 320" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Logo Meu Financeiro</title>
  <desc>Logo com ícone de moeda com gráfico de alta e o nome Meu Financeiro</desc>

  <!-- Círculo externo do ícone -->
  <circle cx="160" cy="160" r="110" fill="#1a1a2e"/>

  <!-- Anel de progresso / arco decorativo -->
  <circle cx="160" cy="160" r="92" fill="none" stroke="#f6a623" stroke-width="5" stroke-dasharray="450 580" stroke-dashoffset="-65" stroke-linecap="round"/>

  <!-- Gráfico de barras estilizado dentro do círculo -->
  <rect x="105" y="185" width="18" height="30" rx="4" fill="#f6a623" opacity="0.6"/>
  <rect x="131" y="165" width="18" height="50" rx="4" fill="#f6a623" opacity="0.8"/>
  <rect x="157" y="145" width="18" height="70" rx="4" fill="#f6a623"/>
  <rect x="183" y="125" width="18" height="90" rx="4" fill="#4ade80"/>

  <!-- Seta de alta -->
  <polyline points="105,185 131,168 157,148 183,128" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="183,118 197,128 183,138" fill="white"/>

  <!-- Símbolo de cifrão estilizado no topo direito -->
  <circle cx="235" cy="85" r="22" fill="#f6a623"/>
  <text x="235" y="93" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#1a1a2e">$</text>

  <!-- Nome principal (texto branco para fundos escuros) -->
  <text x="310" y="140" font-family="sans-serif" font-size="48" font-weight="500" fill="#ffffff">Meu <tspan fill="#f6a623">Financeiro</tspan></text>

  <!-- Subtítulo -->
  <text x="312" y="175" font-family="sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.55)">CONTROLE · METAS · FUTURO</text>

  <!-- Linha decorativa -->
  <line x1="310" y1="190" x2="620" y2="190" stroke="#f6a623" stroke-width="2" stroke-linecap="round"/>
  <line x1="310" y1="196" x2="480" y2="196" stroke="#4ade80" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

</svg>
